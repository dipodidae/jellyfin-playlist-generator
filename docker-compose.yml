services:
  # === Development mode (default): 3 separate containers ===
  db:
    image: pgvector/pgvector:pg16
    container_name: playlist-generator-db
    profiles: ["dev", ""]
    environment:
      - POSTGRES_USER=playlist
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-playlist_dev}
      - POSTGRES_DB=playlist_generator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playlist -d playlist_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playlist-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: playlist-generator-frontend
    profiles: ["dev"]
    environment:
      - NUXT_MUSIC_SERVICE_URL=http://music-service:8000
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      music-service:
        condition: service_healthy
    networks:
      - playlist-network
    restart: unless-stopped

  music-service:
    build: ./service
    container_name: playlist-generator-service
    profiles: ["dev"]
    environment:
      - DATABASE_URL=postgresql://playlist:${POSTGRES_PASSWORD:-playlist_dev}@db:5432/playlist_generator
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MUSIC_DIRECTORIES=${MUSIC_DIRECTORIES:-/music}
      - M3U_OUTPUT_DIR=${M3U_OUTPUT_DIR:-/playlists}
      - SCAN_THREADS=${SCAN_THREADS:-8}
      - EMBEDDING_MODEL_VERSION=1
    volumes:
      - ./data:/app/data
      - ${MUSIC_PATH:-./music}:/music:ro
      - ${PLAYLIST_PATH:-./playlists}:/playlists
    ports:
      - "127.0.0.1:8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - playlist-network
    restart: unless-stopped

  # === Unified mode: single app container + db ===
  unified-db:
    image: pgvector/pgvector:pg16
    container_name: playlist-generator-db
    profiles: ["unified"]
    environment:
      - POSTGRES_USER=playlist
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-playlist_dev}
      - POSTGRES_DB=playlist_generator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playlist -d playlist_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playlist-network
    restart: unless-stopped

  app:
    build: .
    container_name: playlist-generator
    profiles: ["unified"]
    environment:
      - DATABASE_URL=postgresql://playlist:${POSTGRES_PASSWORD:-playlist_dev}@unified-db:5432/playlist_generator
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MUSIC_DIRECTORIES=${MUSIC_DIRECTORIES:-/music}
      - M3U_OUTPUT_DIR=${M3U_OUTPUT_DIR:-/playlists}
      - SCAN_THREADS=${SCAN_THREADS:-8}
      - EMBEDDING_MODEL_VERSION=1
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-admin}
    volumes:
      - ${MUSIC_PATH:-./music}:/music:ro
      - ${PLAYLIST_PATH:-./playlists}:/playlists
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      unified-db:
        condition: service_healthy
    networks:
      - playlist-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  playlist-network:
    driver: bridge
